---
layout: default
---
<iframe src="https://duckduckgo.com/search.html?site=vonald.github.io&prefill=Search DuckDuckGo" style="overflow:hidden;margin:0;padding:0;width:300px;height:30px;" frameborder="0"></iframe>

<div class="post">
  <div class="post-info">

    {% if page.date %}
      <div align="left" ><time datetime="{{ page.date }}">{{ page.date | date: "%d %B %Y" }}</time>
    </div>  
    {% endif %}
  </div>
  <br>
  {{ content }}

</div>

<div class="pagination">
  {% if page.next.url %}
    <a href="{{ page.next.url | prepend: site.baseurl }}" class="left arrow">&#8592;</a>
  {% endif %}
  {% if page.previous.url %}
    <a href="{{ page.previous.url | prepend: site.baseurl }}" class="right arrow">&#8594;</a>
  {% endif %}

  <a href="#" class="top">Top</a>
</div>
