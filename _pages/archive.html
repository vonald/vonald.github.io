<ul>
  {% for post in site.posts %}
    <li>
      <a href="{{ post.url | post.excerpt }}"><time datetime="{{ post.date }}" class="catalogue-time">{{ post.date | date: "%d %B %Y" }}</time>{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
